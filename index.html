<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Bullshit Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Welcome to Random Bullshit Shop!</h1>
    <p>Here you will find the most nigdis gastrenteritida products ever invented.</p>
    <nav>
        <a href="edit.html">🔧 Edit products (maintainers only)</a>
    </nav>
</header>

<main>
    <section id="product-list"></section>
</main>

<footer>
    <p>&copy; all rights reserved to fotios taxiarchis tsakanikos.</p>
</footer>

<script>
let products = [];
const listEl = document.getElementById("product-list");

/* LOAD JSON */
fetch('products.json')
    .then(res => {
        if (!res.ok) throw new Error("Missing products.json");
        return res.json();
    })
    .then(data => {
        products = data;
        render();
    })
    .catch(err => {
        console.error(err);
        listEl.innerHTML = "<p style='color:red;text-align:center;'>Error loading products</p>";
    });

/* RENDER */
function render() {
    listEl.innerHTML = "";

    products.forEach(p => {
        const card = document.createElement("article");
        card.className = "product-card";

        card.innerHTML = `
            <img src="${p.img}" alt="${p.name}" class="product-img">
            <h2 class="product-name">${p.name}</h2>
            <p class="product-price">💲 ${p.price}</p>
            <p class="product-desc">${p.desc}</p>
            <button class="view-btn">View listing</button>
        `;

        const btn = card.querySelector(".view-btn");

        // If link exists → go there
        if (p.link && p.link.trim() !== "") {
            btn.onclick = () => {
                window.open(p.link, "_blank");
            };
        } else {
            // fallback behavior
            btn.onclick = () => {
                alert("No listing link available for this product.");
            };
        }

        listEl.appendChild(card);
    });
}
</script>

</body>
</html>
