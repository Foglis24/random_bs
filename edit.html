<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Διαχείριση</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Διαχείριση Προϊόντων</h1>
    <nav>
        <a href="index.html">← Πίσω στο κατάστημα</a>
    </nav>
</header>

<main>

<h2>Νέο προϊόν</h2>

<input id="name" placeholder="Όνομα"><br><br>
<input id="price" placeholder="Τιμή"><br><br>
<input id="desc" placeholder="Περιγραφή"><br><br>
<input id="img" placeholder="URL εικόνας"><br><br>
<input id="link" placeholder="Link προϊόντος (προαιρετικό)"><br><br>

<button onclick="addProduct()">Αποθήκευση</button>
<button onclick="downloadJSON()">💾 Κατέβασε JSON</button>

<hr>

<h2>Υπάρχοντα προϊόντα</h2>
<div id="existing-products">
    <ul id="list"></ul>
</div>

</main>

<footer>
    <p>Admin panel</p>
</footer>

<script>
let products = [];

/* LOAD */
fetch('products.json')
    .then(res => res.json())
    .then(data => {
        products = data;
        showProducts();
    })
    .catch(err => console.error(err));

/* SHOW */
function showProducts() {
    const list = document.getElementById("list");
    list.innerHTML = "";

    products.forEach((p, i) => {
        const li = document.createElement("li");

        li.innerHTML = `
            ${p.name} (€${p.price})
            <button onclick="deleteProduct(${i})">Διαγραφή</button>
        `;

        list.appendChild(li);
    });
}

/* ADD */
function addProduct() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const desc = document.getElementById("desc").value;
    const img = document.getElementById("img").value;
    const link = document.getElementById("link").value;

    const newProduct = {
        id: Date.now(),
        name,
        price,
        desc,
        img,
        link // optional field
    };

    products.push(newProduct);
    showProducts();

    alert("✔️ Added locally. Download JSON to save.");
}

/* DELETE */
function deleteProduct(i) {
    products.splice(i, 1);
    showProducts();
}

/* DOWNLOAD JSON */
function downloadJSON() {
    const dataStr = JSON.stringify(products, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "products.json";
    a.click();

    URL.revokeObjectURL(a.href);
}
</script>

</body>
</html>
